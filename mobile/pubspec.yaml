name: floodmap_mobile
description: A new Flutter project for flood mapping in Kenya.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^6.1.0
  flutter_map_animations: ^0.7.0
  flutter_map_tile_caching: ^9.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  workmanager: ^0.5.2
  dio: ^5.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_riverpod: ^2.4.9
  crypto: ^3.0.3
  flutter_secure_storage: ^9.0.0
  uuid: ^4.3.3
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0
  path_provider: ^2.1.2
  web_socket_channel: ^2.4.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
