<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloodMap-K™ Command Center</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        #map { height: 600px; border-radius: 12px; border: 1px solid #334155; }
        .card { background: #1e293b; border: 1px solid #334155; color: white; }
        .badge-verified { background: #22c55e; }
        .badge-pending { background: #eab308; color: #0f172a; }
        .btn-premium { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); border: none; }
        .btn-premium:hover { background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%); }
    </style>
</head>
<body>
    <div class="container-fluid py-4">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 fw-bold text-primary">FloodMap-K™ <span class="text-white">Command Center</span></h1>
            <div>
                <button class="btn btn-outline-light me-2">Export KML</button>
                <button class="btn btn-premium text-white">System Status: Active</button>
            </div>
        </header>

        <div class="row">
            <div class="col-md-8">
                <div id="map"></div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header border-bottom border-secondary">
                        <h5 class="mb-0">Recent Reports</h5>
                    </div>
                    <div class="card-body overflow-auto" style="max-height: 520px;">
                        <ul class="list-group list-group-flush" id="report-list">
                            <!-- Reports will be injected here -->
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([-1.2921, 36.8219], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        async function fetchReports() {
            const response = await fetch('/api/reports/');
            const data = await response.json();
            
            L.geoJSON(data, {
                pointToLayer: function (feature, latlng) {
                    return L.circleMarker(latlng, {
                        radius: 8,
                        fillColor: "#ef4444",
                        color: "#000",
                        weight: 1,
                        opacity: 1,
                        fillOpacity: 0.8
                    });
                },
                onEachFeature: function (feature, layer) {
                    layer.bindPopup(`<b>Category:</b> ${feature.properties.category}<br><b>Time:</b> ${feature.properties.timestamp}`);
                }
            }).addTo(map);

            const list = document.getElementById('report-list');
            data.features.forEach(f => {
                const li = document.createElement('li');
                li.className = 'list-group-item bg-transparent text-white border-secondary py-3';
                li.innerHTML = `
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <span class="badge badge-verified mb-1">Verified</span>
                            <div class="small">${f.properties.category.toUpperCase()}</div>
                            <div class="text-secondary smaller">${new Date(f.properties.timestamp).toLocaleString()}</div>
                        </div>
                        <button class="btn btn-sm btn-outline-primary">Details</button>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        fetchReports();
    </script>
</body>
</html>
